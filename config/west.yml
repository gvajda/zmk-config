manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-config
      url: https://github.com/Keebart/zmk-config
      revision: 01556a803e1be9313f4bb5bc66a6451f57eb0044
      path: modules/zmk-config
  self:
    path: config
